name: build

on:
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: Publish built distributions to PyPI
        required: false
        default: false
        type: boolean
  push:
    tags:
    - 'v*'

jobs:

  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: false

    - name: Build package
      run: poetry build

    - name: Setup testing dependencies
      run: |
        pip install dist/belgian_deduce-*.whl
        poetry install --only dev --no-root

    - name: Test build
      run: python -m pytest .

    - name: Upload distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish:

    name: Publish package to PyPI
    needs:
    - build
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/belgian-deduce
    permissions:
      id-token: write

    steps:
    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  release:

    name: Create GitHub release
    needs:
    - publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download distribution artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: Extract release notes from changelog
      env:
        TAG_NAME: ${{ github.ref_name }}
      run: |
        python - <<'PY'
        from pathlib import Path
        import os
        import re
        import sys

        tag_name = os.environ["TAG_NAME"]
        version = tag_name[1:] if tag_name.startswith("v") else tag_name
        changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
        match = re.search(
            rf"(?ms)^## {re.escape(version)} \([^)]+\)\n.*?(?=^## |\Z)",
            changelog,
        )

        if match is None:
            print(
                f"Could not find a CHANGELOG.md section for version {version}.",
                file=sys.stderr,
            )
            raise SystemExit(1)

        Path("release_notes.md").write_text(match.group(0).strip() + "\n", encoding="utf-8")
        PY

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        if gh release view "$TAG_NAME" >/dev/null 2>&1; then
          echo "Release $TAG_NAME already exists; skipping."
          exit 0
        fi

        gh release create "$TAG_NAME" dist/* \
          --verify-tag \
          --title "$TAG_NAME" \
          --notes-file release_notes.md
